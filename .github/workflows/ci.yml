name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Deny check
        run: cargo deny check

      - name: Format check
        run: cargo fmt --check

      - name: Type + compile check
        run: cargo check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build
        run: cargo build --release
