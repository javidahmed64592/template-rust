name: Release Trigger

on:
  push:
    branches:
      - main

jobs:
  release-trigger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check if release should be skipped
        id: check_skip_release
        run: |
          REPO_NAME="${{ github.repository }}"
          REPO_NAME="${REPO_NAME##*/}"
          PACKAGE_NAME=$(cargo pkgid | cut -d# -f2 | cut -d@ -f1)

          if [ "$PACKAGE_NAME" != "${REPO_NAME//-/_}" ]; then
            echo "Package name '$PACKAGE_NAME' does not match repository name '$REPO_NAME'. Skipping release trigger."
            echo "skip_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip_release=false" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        if: steps.check_skip_release.outputs.skip_release == 'false'

      - name: Get package version
        id: get_version
        run: |
          VERSION=$(cargo pkgid | cut -d@ -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        if: steps.check_skip_release.outputs.skip_release == 'false'

      - name: Push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
        if: steps.check_skip_release.outputs.skip_release == 'false'
